<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sursee-ORakel 🔮</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Sursee-ORakel 🔮</h1>
        <p class="subtitle">
          Schluss mit Suchen – in 3 Sekunden zu deinem Mittagessen.
        </p>
      </header>

      <div class="mood-buttons">
        <button id="btn-fastfood" class="mood-btn">🍕 Fast Food</button>
        <button id="btn-healthy" class="mood-btn">🥗 Healthy</button>
        <button id="btn-gemuetlich" class="mood-btn">☕ Gemütlich</button>
      </div>

      <button id="spin-button" class="btn-oracle">Das Orakel befragen!</button>

      <div id="result">
        <p>Wähle einen Mood und befrage das Orakel...</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
